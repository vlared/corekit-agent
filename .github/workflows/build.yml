name: Compilación Multiplataforma CoreKit Agent

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar en ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil websockets

      - name: Compilar Agente Windows (.exe)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --clean --name CoreKitAgent agent.py
          mkdir -p public
          cp dist/CoreKitAgent.exe public/
        shell: bash

      - name: Compilar Agente macOS (.dmg)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --clean --name CoreKitAgent --osx-bundle-identifier com.corekit.agent agent.py
          hdiutil create -format UDZO -srcfolder dist/CoreKitAgent.app dist/CoreKitAgent.dmg
          mkdir -p public
          cp dist/CoreKitAgent.dmg public/

      - name: Compilar Agente Linux (.AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --clean --name corekit-agent agent.py
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          mkdir -p CoreKitAgent.AppDir/usr/bin
          cp dist/corekit-agent CoreKitAgent.AppDir/usr/bin/
          echo -e '#!/bin/sh\nexec "$APPDIR/usr/bin/corekit-agent" "$@"' > CoreKitAgent.AppDir/AppRun
          chmod +x CoreKitAgent.AppDir/AppRun
          echo -e '[Desktop Entry]\nType=Application\nName=CoreKitAgent\nExec=corekit-agent\nIcon=corekit\nCategories=Utility;' > CoreKitAgent.AppDir/corekit.desktop
          wget -O CoreKitAgent.AppDir/corekit.png https://raw.githubusercontent.com/github/explore/main/topics/javascript/javascript.png
          ARCH=x86_64 ./appimagetool CoreKitAgent.AppDir corekit-agent.AppImage
          mkdir -p public
          cp corekit-agent.AppImage public/

      - name: Guardar Ejecutables como Artefactos
        uses: actions/upload-artifact@v4
        with:
          name: agentes-${{ matrix.os }}
          path: public/
          if-no-files-found: error